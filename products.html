<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products Page</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');
body{
    opacity: 0;
    transform: scale(0.98);
    filter: blur(5px);

    animation: pageLoad 0.9s ease forwards;
}

@keyframes pageLoad{
    to{
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
    }
}

:root {
  --bg: #0a0e1a;
  --surface: #111827;
  --surface2: #1a2236;
  --border: rgba(99,179,237,0.15);
  --accent: #3b82f6;
  --accent-glow: rgba(59,130,246,0.35);
  --green: #22c55e;
  --green-glow: rgba(34,197,94,0.3);
  --text: #e2e8f0;
  --text-muted: #64748b;
  --navbar-h: 60px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(59,130,246,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(99,102,241,0.07) 0%, transparent 60%);
}


.navbar {
  background: rgba(10,14,26,0.85);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 30px;
  height: var(--navbar-h);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 3px;
  color: #fff;
  text-shadow: 0 0 20px var(--accent-glow);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.home-btn {
  padding: 8px 18px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: 1px;
  transition: all 0.2s;
  box-shadow: 0 0 14px var(--accent-glow);
}

.home-btn:hover {
  background: #2563eb;
  transform: translateY(-2px);
  box-shadow: 0 0 22px var(--accent-glow);
}

.navbar input {
  padding: 8px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 13px;
  outline: none;
  width: 200px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.navbar input::placeholder { color: var(--text-muted); }

.navbar input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}


.container {
  display: flex;
  padding: 24px 20px;
  gap: 20px;
  max-width: 1400px;
  margin: 0 auto;
}


.sidebar {
  width: 200px;
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 14px;
  height: fit-content;
  flex-shrink: 0;
}

.sidebar h3 {
  margin-bottom: 14px;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'Rajdhani', sans-serif;
}

.sidebar ul { list-style: none; }

.sidebar ul li {
  padding: 10px 12px;
  font-size: 14px;
  color: var(--text);
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
  margin-bottom: 4px;
  border: 1px solid transparent;
}

.sidebar ul li:hover {
  background: var(--surface2);
  border-color: var(--border);
  transform: translateX(3px);
  color: #fff;
}

.sidebar ul li.active {
  background: rgba(59,130,246,0.12);
  border-color: rgba(59,130,246,0.3);
  color: var(--accent);
  font-weight: 500;
}


.products {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  align-content: start;
}


.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 15px 15px;
  text-align: center;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.card:hover {
  transform: translateY(-5px);
  border-color: rgba(59,130,246,0.4);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(59,130,246,0.15);
  background: var(--surface2);
}

.card:hover::before { opacity: 1; }

.card img {
  width: 270px;
  height: 145px;
  object-fit: contain;
  margin-bottom: 12px;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
  transition: filter 0.3s;
  max-width: 100%;

}

.card:hover img {
  filter: drop-shadow(0 6px 18px rgba(59,130,246,0.2));
}

.card h4 {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
  color: #fff;
}

.price {
  color: var(--green);
  font-weight: 700;
  font-size: 16px;
  margin-top: 6px;
  text-shadow: 0 0 10px var(--green-glow);
}

.btn {
  margin-top: 12px;
  padding: 7px 18px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all 0.2s;
  box-shadow: 0 0 12px var(--green-glow);
}

.btn:hover {
  background: #16a34a;
  transform: translateY(-1px);
  box-shadow: 0 0 20px var(--green-glow);
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">DEVPROS</div>
  <div class="nav-right">
    <button class="home-btn" onclick="window.location.href='DEVPROS.html'">Home</button>
    <input type="text" placeholder="Search products...">
  </div>
</div>

<div class="container">

  <div class="sidebar">
    <h3>devices</h3>
    <ul>
  <li class="active" data-brand="apple">Apple</li>
  <li data-brand="acer">Acer</li>
  <li data-brand="asus">Asus</li>
  <li data-brand="dell">Dell</li>
</ul> 
  </div>

  <div class="products">

    <div class="card" data-brand="apple">
      <img src="Apple-MacBook-Air-2-up-front-240304-1536x612.webp" alt="Macbook Air 2025">
      <h4>Macbook Air 2025</h4>
      <div class="price">$650</div>
      <button class="btn">Buy</button>
    </div>

    <div class="card" data-brand="acer">
      <img src="cde9877d-9c98-4b2b-96c5-c23f9d94ec24.jpg" alt="Acer Aspire 5">
      <h4>Acer Aspire 5</h4>
      <div class="price">$350</div>
      <button class="btn">Buy</button>
    </div>

    <div class="card" data-brand="asus">
      <img src="res_4f9b3e6f45190e356241ff1361d3e248.avif" alt="Asus Tuf F15">
      <h4>Asus Tuf F15</h4>
      <div class="price">$420</div>
      <button class="btn">Buy</button>
    </div>

    <div class="card" data-brand="dell">
      <img src="download.webp" alt="Dell G17">
      <h4>Dell G17</h4>
      <div class="price">$545</div>
      <button class="btn">Buy</button>
    </div>

<script>
const categories = document.querySelectorAll(".sidebar li");
const cards = document.querySelectorAll(".card");

categories.forEach(category => {
    category.addEventListener("click", () => {

        categories.forEach(item => item.classList.remove("active"));
        category.classList.add("active");

        const selectedBrand = category.dataset.brand;

        cards.forEach(card => {
            if (card.dataset.brand === selectedBrand) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });

    });
});
</script>




</body></html>
